<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>심사 관리자 페이지</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 900px; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; text-align: center; margin-bottom: 30px; }
        th, td { border: 1px solid #ddd; padding: 10px; }
        th { background-color: #f4f4f4; }
        .btn-group { margin-bottom: 15px; }
        button { padding: 10px 15px; color: white; border: none; cursor: pointer; font-size: 14px; margin-right: 5px; }
        input[type="text"] { padding: 8px; font-size: 14px; margin-right: 5px; width: 200px; }
        #refresh-btn { background-color: #28a745; }
        #refresh-btn:hover { background-color: #218838; }
        #excel-btn { background-color: #17a2b8; }
        #excel-btn:hover { background-color: #138496; }
        #upload-csv-btn { background-color: #ffc107; color: black; }
        #upload-csv-btn:hover { background-color: #e0a800; }
        .section-title { border-left: 4px solid #007bff; padding-left: 10px; margin-top: 30px; }
    </style>
</head>
<body>

    <h2>심사 관리자 종합 대시보드</h2>
    <div class="btn-group">
        <input type="text" id="filter-input" placeholder="부문 검색 (예: 성인1)">
        <button id="refresh-btn">검색 및 새로고침</button>
        <button id="excel-btn">엑셀(CSV) 다운로드</button>
    </div>

    <h3 class="section-title">📁 참가자 명단 일괄 등록 (CSV)</h3>
    <div class="btn-group">
        <input type="file" id="csv-file" accept=".csv">
        <button id="upload-csv-btn">CSV 일괄 업로드</button>
        <p style="font-size: 12px; color: #666; margin-top: 5px;">※ CSV 파일 작성법: 엑셀에서 A열(번호), B열(이름), C열(분류) 순서로 작성 후 'CSV UTF-8 (쉼표로 분리)' 형식으로 저장</p>
    </div>

    <h3 class="section-title">📊 심사위원별 평가 진행 현황</h3>
    <table id="status-table">
        <thead>
            <tr>
                <th>심사위원 이름</th>
                <th>평가 완료 건수</th>
                <th>최근 평가한 참가자 번호</th>
            </tr>
        </thead>
        <tbody id="status-body">
            <tr>
                <td colspan="3">데이터를 불러오는 중입니다...</td>
            </tr>
        </tbody>
    </table>

    <h3 class="section-title">🏆 참가자 순위 및 최종 합산 점수</h3>
    <table id="result-table">
        <thead>
            <tr>
                <th>순위</th>
                <th>참가자 번호</th>
                <th>참가자 이름</th>
                <th>분류(부문)</th>
                <th>심사위원 수</th>
                <th>최종 합산 점수</th>
            </tr>
        </thead>
        <tbody id="result-body">
            <tr>
                <td colspan="6">데이터를 불러오는 중입니다...</td>
            </tr>
        </tbody>
    </table>

    <script type="module">
        const adminPw = prompt("관리자 비밀번호를 입력하세요.");
        if (adminPw !== "admin1234") {
            alert("비밀번호가 일치하지 않습니다.");
            document.body.innerHTML = "<h2 style='text-align:center; margin-top:50px;'>접근이 거부되었습니다.</h2>";
            throw new Error("Unauthorized");
        }

        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAoy2h2gxIZRx9EY02SpiBicPM4FnWaqrI",
            authDomain: "evaluation-sheet-353cc.firebaseapp.com",
            projectId: "evaluation-sheet-353cc",
            storageBucket: "evaluation-sheet-353cc.firebasestorage.app",
            messagingSenderId: "292646528829",
            appId: "1:292646528829:web:4503667a830e199126c754"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('upload-csv-btn').addEventListener('click', () => {
            const fileInput = document.getElementById('csv-file');
            const file = fileInput.files[0];
            if (!file) {
                alert("CSV 파일을 선택해주세요.");
                return;
            }

            const reader = new FileReader();
            reader.onload = async function(e) {
                const text = e.target.result;
                const rows = text.split('\n');
                let successCount = 0;

                for (let i = 0; i < rows.length; i++) {
                    const row = rows[i].trim();
                    if (!row) continue;
                    
                    const cols = row.split(',');
                    if (cols.length >= 3) {
                        const pId = cols[0].trim();
                        const pName = cols[1].trim();
                        const pInfo = cols.slice(2).join(',').trim(); 

                        try {
                            await setDoc(doc(db, "participants", pId), {
                                name: pName,
                                info: pInfo
                            });
                            successCount++;
                        } catch (error) {
                            console.error("업로드 오류:", error);
                        }
                    }
                }
                alert(successCount + "명의 참가자 명단이 업로드되었습니다.");
                loadDashboard();
            };
            reader.readAsText(file);
        });

        async function loadDashboard() {
            const statusBody = document.getElementById('status-body');
            const resultBody = document.getElementById('result-body');
            const filterKeyword = document.getElementById('filter-input').value.trim();
            
            statusBody.innerHTML = '<tr><td colspan="3">데이터를 불러오는 중입니다...</td></tr>';
            resultBody.innerHTML = '<tr><td colspan="6">데이터를 불러오는 중입니다...</td></tr>';

            try {
                const judgesSnap = await getDocs(collection(db, "judges"));
                const judgeInfo = {};
                judgesSnap.forEach(doc => {
                    judgeInfo[doc.id] = { name: doc.data().name, count: 0, latestPId: 0 };
                });

                const querySnapshot = await getDocs(collection(db, "scores"));
                const participantData = {};

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const jId = data.judgeId;
                    const pId = data.participantId;
                    
                    if (judgeInfo[jId]) {
                        judgeInfo[jId].count++;
                        if (parseInt(pId) > judgeInfo[jId].latestPId) {
                            judgeInfo[jId].latestPId = parseInt(pId);
                        }
                    }

                    if (!data.isAbsent) {
                        if (!participantData[pId]) {
                            participantData[pId] = [];
                        }
                        participantData[pId].push({
                            total: data.techScore + data.expScore + data.artScore,
                            tech: data.techScore,
                            exp: data.expScore,
                            art: data.artScore
                        });
                    }
                });

                statusBody.innerHTML = '';
                let statusHtml = '';
                for (const jId in judgeInfo) {
                    const info = judgeInfo[jId];
                    const latestText = info.latestPId > 0 ? `${info.latestPId}번` : '진행 전';
                    statusHtml += `
                        <tr>
                            <td>${info.name}</td>
                            <td>${info.count}명 완료</td>
                            <td>${latestText}</td>
                        </tr>
                    `;
                }
                if (statusHtml === '') {
                    statusHtml = '<tr><td colspan="3">등록된 심사위원이 없습니다.</td></tr>';
                }
                statusBody.innerHTML = statusHtml;

                let ranking = [];
                for (const pId in participantData) {
                    let scores = participantData[pId];
                    const judgeCount = scores.length;
                    
                    if (judgeCount >= 3) {
                        scores.sort((a, b) => a.total - b.total);
                        scores.shift(); 
                        scores.pop();   
                    }

                    let finalScore = 0;
                    let finalTech = 0;
                    let finalExp = 0;

                    scores.forEach(s => {
                        finalScore += s.total;
                        finalTech += s.tech;
                        finalExp += s.exp;
                    });

                    let pName = "이름 없음";
                    let pInfo = "분류 없음";
                    try {
                        const pDoc = await getDoc(doc(db, "participants", pId));
                        if (pDoc.exists()) {
                            pName = pDoc.data().name || "이름 없음";
                            pInfo = pDoc.data().info || "분류 없음";
                        }
                    } catch(e) {
                        console.error("이름 로드 실패", e);
                    }

                    if (filterKeyword === "" || pInfo.includes(filterKeyword)) {
                        ranking.push({
                            pId: pId,
                            pName: pName,
                            pInfo: pInfo,
                            judgeCount: judgeCount,
                            finalScore: finalScore,
                            finalTech: finalTech,
                            finalExp: finalExp
                        });
                    }
                }

                ranking.sort((a, b) => {
                    if (b.finalScore !== a.finalScore) return b.finalScore - a.finalScore;
                    if (b.finalTech !== a.finalTech) return b.finalTech - a.finalTech;
                    return b.finalExp - a.finalExp;
                });

                resultBody.innerHTML = '';
                if (ranking.length === 0) {
                    resultBody.innerHTML = '<tr><td colspan="6">조건에 맞는 데이터가 없습니다.</td></tr>';
                    return;
                }

                // 순위에 따른 메달 색상 표기 처리
                ranking.forEach((data, index) => {
                    let prizeInfo = '';
                    if (index === 0) {
                        prizeInfo = ' <span style="color: #FFD700; font-weight: bold;">(금상)</span>';
                    } else if (index === 1) {
                        prizeInfo = ' <span style="color: #C0C0C0; font-weight: bold;">(은상)</span>';
                    } else if (index === 2) {
                        prizeInfo = ' <span style="color: #CD7F32; font-weight: bold;">(동상)</span>';
                    }

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${index + 1}</td>
                        <td>${data.pId}번</td>
                        <td>${data.pName}</td>
                        <td>${data.pInfo}</td>
                        <td>${data.judgeCount}명</td>
                        <td>${data.finalScore}점${prizeInfo}</td>
                    `;
                    resultBody.appendChild(tr);
                });

            } catch (error) {
                console.error("데이터 불러오기 오류:", error);
                resultBody.innerHTML = '<tr><td colspan="6">데이터를 불러오는 데 실패했습니다.</td></tr>';
            }
        }

        function downloadCSV() {
            const table = document.getElementById("result-table");
            let csv = [];
            for (let i = 0; i < table.rows.length; i++) {
                let row = [], cols = table.rows[i].querySelectorAll("td, th");
                for (let j = 0; j < cols.length; j++) {
                    row.push(cols[j].innerText.replace(/(\r\n|\n|\r)/gm, " "));
                }
                csv.push(row.join(","));
            }
            const csvFile = new Blob(["\uFEFF" + csv.join("\n")], {type: "text/csv;charset=utf-8;"});
            const downloadLink = document.createElement("a");
            downloadLink.download = "순위결과.csv";
            downloadLink.href = window.URL.createObjectURL(csvFile);
            downloadLink.style.display = "none";
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        }

        document.getElementById('refresh-btn').addEventListener('click', loadDashboard);
        document.getElementById('excel-btn').addEventListener('click', downloadCSV);

        loadDashboard();
    </script>
</body>
</html>
