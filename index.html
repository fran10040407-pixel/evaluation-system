<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>심사 평가 시스템</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="password"], input[type="number"] { width: 100%; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; color: white; border: none; cursor: pointer; font-size: 16px; margin-bottom: 10px; }
        .btn-primary { background-color: #007bff; }
        .btn-primary:hover { background-color: #0056b3; }
        .btn-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn-row button { margin-bottom: 0; }
        .btn-secondary { background-color: #6c757d; }
        .btn-secondary:hover { background-color: #5a6268; }
        .btn-danger { background-color: #dc3545; }
        .btn-danger:hover { background-color: #c82333; }
        #evaluation-container { display: none; }
        
        /* 참가자 이름 강조 스타일 추가 */
        #p-name { 
            font-size: 28px; 
            font-weight: bold; 
            color: #0056b3; 
            background-color: #f4f4f4; 
            padding: 5px 10px; 
            border-radius: 5px; 
            display: inline-block; 
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div id="login-container">
        <h2>심사위원 로그인</h2>
        <div class="form-group">
            <label for="judgeName">심사위원 이름</label>
            <input type="text" id="judgeName" required>
        </div>
        <div class="form-group">
            <label for="judgePin">PIN 번호 (비밀번호)</label>
            <input type="password" id="judgePin" required>
        </div>
        <button id="login-btn" class="btn-primary">로그인</button>
    </div>

    <div id="evaluation-container">
        <h2>참가자 평가 (<span id="participant-num">1</span>번)</h2>
        <p>심사위원: <span id="judge-display-name"></span></p>
        <div id="participant-info" class="form-group">
            <p><strong>이름:</strong> <br><span id="p-name">불러오는 중...</span></p>
            <p><strong>분류:</strong> <span id="p-info">불러오는 중...</span></p>
        </div>

        <form id="score-form">
            <div class="form-group">
                <label for="techScore">기술성 (1~10점)</label>
                <input type="number" id="techScore" min="1" max="10" required>
            </div>
            <div class="form-group">
                <label for="expScore">표현력 (1~10점)</label>
                <input type="number" id="expScore" min="1" max="10" required>
            </div>
            <div class="form-group">
                <label for="artScore">작품성 (1~10점)</label>
                <input type="number" id="artScore" min="1" max="10" required>
            </div>
            
            <button type="submit" class="btn-primary">점수 제출 및 다음 참가자 이동</button>
            
            <div class="btn-row">
                <button type="button" id="prev-btn" class="btn-secondary">이전 참가자로 돌아가기</button>
                <button type="button" id="absent-btn" class="btn-danger">결시 처리 (다음으로)</button>
            </div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAoy2h2gxIZRx9EY02SpiBicPM4FnWaqrI",
            authDomain: "evaluation-sheet-353cc.firebaseapp.com",
            projectId: "evaluation-sheet-353cc",
            storageBucket: "evaluation-sheet-353cc.firebasestorage.app",
            messagingSenderId: "292646528829",
            appId: "1:292646528829:web:4503667a830e199126c754"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentParticipantNum = 1;
        let currentJudgeId = "";

        async function loadParticipantInfo(num) {
            try {
                const docRef = doc(db, "participants", String(num));
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('p-name').innerText = data.name || "이름 없음";
                    document.getElementById('p-info').innerText = data.info || "분류 없음";
                } else {
                    document.getElementById('p-name').innerText = "정보 없음";
                    document.getElementById('p-info').innerText = "정보 없음";
                }
            } catch (error) {
                console.error("참가자 정보 로드 오류:", error);
            }
        }

        async function moveToNext() {
            currentParticipantNum++;
            document.getElementById('participant-num').innerText = currentParticipantNum;
            document.getElementById('score-form').reset();
            await loadParticipantInfo(currentParticipantNum);
        }

        document.getElementById('login-btn').addEventListener('click', async () => {
            const name = document.getElementById('judgeName').value;
            const pin = document.getElementById('judgePin').value;

            if (!name || !pin) {
                alert("이름과 PIN 번호를 모두 입력해주세요.");
                return;
            }

            try {
                const q = query(collection(db, "judges"), where("name", "==", name), where("pin", "==", pin));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    querySnapshot.forEach((doc) => {
                        currentJudgeId = doc.id;
                        document.getElementById('judge-display-name').innerText = doc.data().name;
                    });

                    document.getElementById('login-container').style.display = 'none';
                    document.getElementById('evaluation-container').style.display = 'block';
                    
                    await loadParticipantInfo(currentParticipantNum);
                } else {
                    alert("등록된 심사위원 정보와 일치하지 않습니다.");
                }
            } catch (error) {
                alert("로그인 처리 중 오류가 발생했습니다.");
            }
        });

        document.getElementById('prev-btn').addEventListener('click', async () => {
            if (currentParticipantNum > 1) {
                currentParticipantNum--;
                document.getElementById('participant-num').innerText = currentParticipantNum;
                document.getElementById('score-form').reset();
                await loadParticipantInfo(currentParticipantNum);
            } else {
                alert("첫 번째 참가자입니다.");
            }
        });

        document.getElementById('absent-btn').addEventListener('click', async () => {
            if (confirm(`${currentParticipantNum}번 참가자를 결시 처리하시겠습니까?`)) {
                try {
                    const scoreDocId = `${currentJudgeId}_${currentParticipantNum}`;
                    await setDoc(doc(db, "scores", scoreDocId), {
                        judgeId: currentJudgeId,
                        participantId: String(currentParticipantNum),
                        techScore: 0,
                        expScore: 0,
                        artScore: 0,
                        isAbsent: true,
                        timestamp: new Date()
                    });
                    await moveToNext();
                } catch (error) {
                    alert("결시 처리에 실패했습니다.");
                }
            }
        });

        document.getElementById('score-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const techScore = parseInt(document.getElementById('techScore').value);
            const expScore = parseInt(document.getElementById('expScore').value);
            const artScore = parseInt(document.getElementById('artScore').value);

            try {
                const scoreDocId = `${currentJudgeId}_${currentParticipantNum}`;
                await setDoc(doc(db, "scores", scoreDocId), {
                    judgeId: currentJudgeId,
                    participantId: String(currentParticipantNum),
                    techScore: techScore,
                    expScore: expScore,
                    artScore: artScore,
                    isAbsent: false,
                    timestamp: new Date()
                });

                alert(`${currentParticipantNum}번 참가자 평가가 제출되었습니다.`);
                await moveToNext();

            } catch (error) {
                alert("점수 저장에 실패했습니다.");
            }
        });
    </script>
</body>
</html>
